<style>
:root{
  --bg:#f7f5ef;--bg-2:#eef1f6;--panel:rgba(255,255,255,.78);--panel-strong:#ffffff;
  --text:#1f2937;--muted:#64748b;--brand:#2563eb;--brand-2:#6bb7ff;
  --line:rgba(37,99,235,.14);--line-2:rgba(15,23,42,.08);
  --shadow:0 24px 80px rgba(0,0,0,.12);--radius:20px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'Inter',sans-serif;
  background:
    radial-gradient(circle at 20% 20%, rgba(37,99,235,.09), transparent 28%),
    radial-gradient(circle at 80% 15%, rgba(15,23,42,.05), transparent 24%),
    radial-gradient(circle at 50% 100%, rgba(37,99,235,.06), transparent 30%),
    linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
  color:#1f2937;min-height:100vh;overflow-x:hidden;
}
a{text-decoration:none;color:inherit}

/* ── CURSOR ── */
.cursor-ring{position:fixed;left:0;top:0;width:18px;height:18px;border:1px solid rgba(43,111,232,.28);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);backdrop-filter:blur(1px);box-shadow:0 0 12px rgba(135,206,250,.12),inset 0 0 6px rgba(255,255,255,.22);transition:width .08s linear,height .08s linear,border-color .08s linear,opacity .08s linear,transform .08s linear}
.cursor-dot{position:fixed;left:0;top:0;width:4px;height:4px;background:#2b6fe8;border-radius:50%;pointer-events:none;z-index:10000;transform:translate(-50%,-50%);box-shadow:0 0 10px rgba(43,111,232,.75)}

/* ── PARTICLES CANVAS ── */
#particleCanvas{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.55}

/* ── NAV ── */
nav{position:fixed;top:0;left:0;right:0;z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:1.1rem 2rem;transition:.4s ease;border-bottom:1px solid transparent}
nav.scrolled{background:rgba(255,255,255,.85);backdrop-filter:blur(22px);border-bottom-color:rgba(37,99,235,.12);box-shadow:0 2px 32px rgba(0,0,0,.08)}
.nav-logo{display:flex;align-items:center;gap:.85rem;font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:700;letter-spacing:.02em;cursor:pointer}
.nav-logo-img{width:42px;height:42px;border-radius:999px;object-fit:cover;
  box-shadow:0 0 0 1.5px rgba(37,99,235,.3),0 8px 28px rgba(0,0,0,.22);
  transition:transform .35s ease,box-shadow .35s ease;
  animation:logoPulse 4s ease-in-out infinite}
.nav-logo:hover .nav-logo-img{transform:scale(1.08) rotate(-4deg);box-shadow:0 0 0 2px rgba(37,99,235,.5),0 12px 36px rgba(37,99,235,.25)}
@keyframes logoPulse{0%,100%{box-shadow:0 0 0 1.5px rgba(37,99,235,.3),0 8px 28px rgba(0,0,0,.22)}50%{box-shadow:0 0 0 3px rgba(37,99,235,.18),0 8px 28px rgba(37,99,235,.18)}}
.nav-links{display:flex;align-items:center;gap:1.4rem}
.nav-links a{color:#1f2937;font-size:.95rem;transition:.2s ease;position:relative}
.nav-links a::after{content:'';position:absolute;bottom:-3px;left:0;width:0;height:1.5px;background:var(--brand);border-radius:999px;transition:width .25s ease}
.nav-links a:hover{color:var(--brand)}
.nav-links a:hover::after{width:100%}
.nav-links a.active{color:var(--brand);font-weight:600}
.nav-cta{padding:.8rem 1.2rem;border:1px solid rgba(37,99,235,.22);border-radius:999px;background:linear-gradient(180deg,rgba(37,99,235,.10),rgba(37,99,235,.05))}
.nav-cta:hover{transform:translateY(-1px);box-shadow:0 0 0 1px rgba(37,99,235,.18),0 10px 24px rgba(37,99,235,.15)}
.nav-cta::after{display:none}

/* ── HERO ── */
.portal-hero{padding:10rem 1.5rem 3rem;text-align:center;position:relative;overflow:hidden;z-index:1}
.portal-hero::before{
  content:'';position:absolute;width:600px;height:600px;
  background:radial-gradient(circle,rgba(37,99,235,.13),transparent 65%);
  top:-160px;left:50%;transform:translateX(-50%);
  border-radius:50%;filter:blur(30px);pointer-events:none;
  animation:floatA 18s ease-in-out infinite;
}
.hero-grid{
  position:absolute;inset:0;
  background-image:linear-gradient(rgba(37,99,235,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(37,99,235,.05) 1px,transparent 1px);
  background-size:72px 72px;
  mask-image:radial-gradient(circle at center,black 0%,black 40%,transparent 80%);
  opacity:.35;pointer-events:none;
  transform:perspective(900px) rotateX(58deg) translateY(30%);
}

/* Logo hero central */
.hero-logo-wrap{
  position:relative;z-index:2;
  display:inline-block;margin-bottom:1.6rem;
  animation:heroLogoIn 1s cubic-bezier(.22,1,.36,1) both .1s;
}
.hero-logo-wrap img{
  width:92px;height:92px;border-radius:999px;object-fit:cover;
  box-shadow:
    0 0 0 2px rgba(37,99,235,.25),
    0 0 0 8px rgba(37,99,235,.07),
    0 20px 60px rgba(37,99,235,.22),
    0 4px 20px rgba(0,0,0,.18);
  animation:heroImgFloat 7s ease-in-out infinite .5s;
}
.hero-logo-ring{
  position:absolute;inset:-14px;border-radius:50%;
  border:1px solid rgba(37,99,235,.18);
  animation:ringRotate 28s linear infinite;
}
.hero-logo-ring::after{
  content:'';position:absolute;width:8px;height:8px;
  background:var(--brand);border-radius:50%;
  top:4px;left:50%;transform:translateX(-50%);
  box-shadow:0 0 10px rgba(37,99,235,.8);
}
.hero-logo-ring2{
  position:absolute;inset:-26px;border-radius:50%;
  border:1px dashed rgba(37,99,235,.10);
  animation:ringRotate 48s linear infinite reverse;
}
@keyframes heroLogoIn{from{opacity:0;transform:translateY(30px) scale(.88)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes heroImgFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes ringRotate{to{transform:rotate(360deg)}}

.portal-hero h1{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(2.6rem,5.5vw,4.2rem);
  font-weight:500;color:#1f2937;line-height:1.05;
  margin-bottom:1rem;position:relative;z-index:2;
  animation:rise .85s cubic-bezier(.22,1,.36,1) both .25s;
}
.portal-hero h1 em{color:var(--brand);font-style:italic}
.portal-hero p{
  color:var(--muted);font-size:1.05rem;max-width:520px;
  margin:0 auto 2.4rem;position:relative;z-index:2;
  animation:rise .85s cubic-bezier(.22,1,.36,1) both .38s;
  line-height:1.7;
}

/* ── STATS BAR ── */
.stats-bar{
  display:flex;align-items:center;justify-content:center;gap:2.5rem;
  margin-bottom:2.8rem;position:relative;z-index:2;
  animation:rise .85s ease both .48s;
  flex-wrap:wrap;
}
.stat-item{text-align:center}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:1.9rem;font-weight:600;color:#0f172a;line-height:1}
.stat-lbl{font-size:.75rem;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;margin-top:.15rem}
.stat-sep{width:1px;height:32px;background:rgba(37,99,235,.15)}

/* ── BUSCADOR ── */
.search-wrap{
  max-width:600px;margin:0 auto 3.8rem;
  position:relative;z-index:10;
  animation:rise .85s ease both .55s;
}
.search-wrap input{
  width:100%;background:rgba(255,255,255,.92);
  border:1px solid rgba(37,99,235,.2);border-radius:999px;
  padding:.95rem 1.5rem .95rem 3.4rem;
  color:#1f2937;font-size:1rem;outline:none;
  box-shadow:0 4px 28px rgba(37,99,235,.10),0 1px 0 rgba(255,255,255,.8) inset;
  transition:border-color .2s,box-shadow .25s,background .2s;
  backdrop-filter:blur(10px);
}
.search-wrap input:focus{
  border-color:rgba(37,99,235,.5);background:rgba(255,255,255,.98);
  box-shadow:0 0 0 3px rgba(37,99,235,.12),0 8px 36px rgba(37,99,235,.14);
}
.search-wrap input::placeholder{color:#94a3b8}
.search-icon{position:absolute;left:1.15rem;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;transition:color .2s}
.search-wrap:focus-within .search-icon{color:var(--brand)}
.search-count{position:absolute;right:1.3rem;top:50%;transform:translateY(-50%);font-size:.78rem;color:var(--muted);pointer-events:none;transition:opacity .2s}

/* ── GRID ── */
.areas-wrap{max-width:1140px;margin:0 auto;padding:0 1.5rem 6rem;position:relative;z-index:1}
.section-label{
  font-size:.72rem;font-weight:700;letter-spacing:.12em;
  text-transform:uppercase;color:var(--muted);margin-bottom:1.6rem;
  display:flex;align-items:center;gap:.7rem;
}
.section-label::before{content:'';display:inline-block;width:18px;height:1px;background:rgba(37,99,235,.3)}
.areas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.2rem}

/* ── CARD ── */
.area-card{
  background:rgba(255,255,255,.74);
  border:1px solid rgba(37,99,235,.09);
  border-radius:var(--radius);padding:1.65rem 1.75rem;
  transition:all .3s cubic-bezier(.22,1,.36,1);
  position:relative;overflow:hidden;
  display:flex;flex-direction:column;gap:.75rem;
  backdrop-filter:blur(10px);
  box-shadow:0 2px 12px rgba(0,0,0,.04),0 1px 0 rgba(255,255,255,.7) inset;
  cursor:pointer;
  animation:cardIn .5s cubic-bezier(.22,1,.36,1) both;
}
.area-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:var(--card-color,var(--brand));opacity:0;
  transition:opacity .3s;border-radius:var(--radius) var(--radius) 0 0;
}
.area-card::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at var(--mx,50%) var(--my,50%),rgba(37,99,235,.06),transparent 60%);
  opacity:0;transition:opacity .3s;pointer-events:none;border-radius:var(--radius);
}
.area-card:hover{
  border-color:rgba(37,99,235,.2);
  transform:translateY(-5px) scale(1.01);
  box-shadow:0 24px 64px rgba(37,99,235,.14),0 4px 20px rgba(0,0,0,.07);
  background:rgba(255,255,255,.97);
}
.area-card:hover::before{opacity:1}
.area-card:hover::after{opacity:1}
.area-card.hidden{display:none}
@keyframes cardIn{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

.area-icon{
  width:52px;height:52px;border-radius:15px;
  display:flex;align-items:center;justify-content:center;font-size:1.55rem;
  background:var(--card-bg,rgba(37,99,235,.08));
  border:1px solid var(--card-border,rgba(37,99,235,.15));
  flex-shrink:0;transition:transform .3s cubic-bezier(.22,1,.36,1),box-shadow .3s;
}
.area-card:hover .area-icon{transform:scale(1.1) rotate(-5deg);box-shadow:0 8px 24px var(--card-shadow,rgba(37,99,235,.2))}
.area-card h2{font-size:1.06rem;font-weight:700;color:#111827;line-height:1.3}
.area-card p{font-size:.84rem;color:var(--muted);line-height:1.6;flex:1}
.area-arrow{
  font-size:.82rem;color:var(--brand);font-weight:600;
  display:flex;align-items:center;gap:.35rem;
  opacity:0;transform:translateX(-6px);transition:all .25s;
}
.area-card:hover .area-arrow{opacity:1;transform:translateX(0)}

.no-results{color:var(--muted);font-size:.95rem;padding:3rem 0;text-align:center;display:none}

/* ── PRÓXIMAMENTE ── */
.coming-soon-block{text-align:center;padding-top:1rem}
.coming-soon-grid{display:flex;flex-wrap:wrap;gap:.75rem;justify-content:center;margin-top:.5rem}
.coming-card{
  display:flex;align-items:center;gap:.5rem;
  padding:.55rem 1.1rem;border-radius:999px;
  background:rgba(255,255,255,.6);border:1px solid rgba(37,99,235,.12);
  font-size:.85rem;color:var(--muted);backdrop-filter:blur(8px);
}
.coming-cta{
  display:inline-block;margin-top:1rem;
  padding:.7rem 1.6rem;border-radius:999px;
  border:1px solid rgba(37,99,235,.3);
  background:linear-gradient(180deg,rgba(37,99,235,.1),rgba(37,99,235,.05));
  color:var(--brand);font-size:.88rem;font-weight:600;
  transition:all .25s ease;
}
.coming-cta:hover{background:rgba(37,99,235,.14);transform:translateY(-1px);box-shadow:0 6px 20px rgba(37,99,235,.15)}

/* ── FOOTER ── */
footer{border-top:1px solid var(--line-2);text-align:center;padding:2rem;font-size:.8rem;color:var(--muted);position:relative;z-index:1}
footer a{color:var(--brand);transition:opacity .2s}
footer a:hover{opacity:.7}
.footer-logo{display:flex;align-items:center;justify-content:center;gap:.6rem;margin-bottom:.6rem}
.footer-logo img{width:26px;height:26px;border-radius:999px;opacity:.75}

/* ── ANIMATIONS ── */
@keyframes floatA{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-20px)}}
@keyframes rise{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:640px){
  nav{padding:1rem 1.1rem}.nav-links{display:none}
  .portal-hero{padding:8rem 1.2rem 2.5rem}
  .stats-bar{gap:1.2rem}.stat-sep{display:none}

<script>
/* ── PARTICLES ── */
(function(){
  const canvas=document.getElementById('particleCanvas');
  const ctx=canvas.getContext('2d');
  let W,H,particles=[];
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight}
  resize();
  window.addEventListener('resize',resize);
  function rand(a,b){return a+Math.random()*(b-a)}
  for(let i=0;i<55;i++){
    particles.push({
      x:rand(0,1),y:rand(0,1),
      vx:rand(-.0002,.0002),vy:rand(-.0003,-.0001),
      r:rand(1,3.5),o:rand(.08,.3),
      pulse:rand(0,Math.PI*2),pSpeed:rand(.008,.022)
    })
  }
  function draw(){
    ctx.clearRect(0,0,W,H);
    const t=Date.now()*.001;
    particles.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;
      if(p.y<-.01)p.y=1.01;
      if(p.x<-.01)p.x=1.01;
      if(p.x>1.01)p.x=-.01;
      const pulse=Math.sin(t*p.pSpeed*100+p.pulse)*.5+.5;
      ctx.beginPath();
      ctx.arc(p.x*W,p.y*H,p.r*(0.7+pulse*0.5),0,Math.PI*2);
      ctx.fillStyle=`rgba(37,99,235,${p.o*(0.5+pulse*0.5)})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

/* ── CURSOR ── */
const cursorRing=document.createElement('div');cursorRing.className='cursor-ring';
const cursorDot=document.createElement('div');cursorDot.className='cursor-dot';
document.body.appendChild(cursorRing);document.body.appendChild(cursorDot);
document.body.style.cursor='none';document.documentElement.style.cursor='none';
let mx=0,my=0,rx=0,ry=0;
window.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cursorRing.style.opacity='1';cursorDot.style.opacity='1'});
window.addEventListener('mouseleave',()=>{cursorRing.style.opacity='0';cursorDot.style.opacity='0'});
window.addEventListener('mouseenter',()=>{cursorRing.style.opacity='1';cursorDot.style.opacity='1'});
(function follow(){rx+=(mx-rx)*0.55;ry+=(my-ry)*0.55;cursorRing.style.left=rx+'px';cursorRing.style.top=ry+'px';cursorDot.style.left=mx+'px';cursorDot.style.top=my+'px';requestAnimationFrame(follow)})();
function bindCursor(el){
  el.addEventListener('mouseenter',()=>{cursorRing.style.transform='translate(-50%,-50%) scale(1.28)';cursorRing.style.borderRadius=el.tagName==='INPUT'?'10px':'999px';cursorRing.style.background='rgba(91,188,255,.09)'});
  el.addEventListener('mouseleave',()=>{cursorRing.style.transform='translate(-50%,-50%) scale(1)';cursorRing.style.borderRadius='50%';cursorRing.style.background='transparent'});
}
document.querySelectorAll('a,button,input,.area-card').forEach(bindCursor);

/* ── NAV ── */
const navEl=document.getElementById('nav');
window.addEventListener('scroll',()=>navEl.classList.toggle('scrolled',scrollY>40),{passive:true});

/* ── CARD MOUSE GLOW ── */
document.addEventListener('mousemove',e=>{
  document.querySelectorAll('.area-card').forEach(card=>{
    const r=card.getBoundingClientRect();
    const x=((e.clientX-r.left)/r.width*100).toFixed(1);
    const y=((e.clientY-r.top)/r.height*100).toFixed(1);
    card.style.setProperty('--mx',x+'%');
    card.style.setProperty('--my',y+'%');
  });
});

/* ── DATOS ── */
const AREAS=[
  {id:'Vivienda/portal.html',  icon:'🏠',color:'#2563eb',titulo:'Vivienda y Propiedad',      desc:'Compraventa, hipotecas, comunidades de propietarios y derechos del comprador.',     url:'Vivienda/portal.html'},
  {id:'Alquiler/portal.html',  icon:'🔑',color:'#10b981',titulo:'Alquiler y Arrendamientos', desc:'Contratos de alquiler, fianzas, desahucios y derechos del inquilino y propietario.',url:'Alquiler/portal.html'},
  {id:'Consumo/portal.html',   icon:'🛒',color:'#f59e0b',titulo:'Consumo y Compras',          desc:'Devoluciones, garantías, fraudes, comercio electrónico y defensa del consumidor.',  url:'Consumo/portal.html'},
  {id:'Impuestos/portal.html', icon:'📊',color:'#ef4444',titulo:'Impuestos y Fiscalidad',     desc:'IRPF, IVA, declaración de la renta, sanciones de Hacienda y recursos fiscales.',   url:'Impuestos/portal.html'},
  {id:'Herencias/portal.html',  icon:'📜',color:'#d97706',titulo:'Herencias y Sucesiones',     desc:'Testamentos, reparto de herencia, legítimas, aceptación o renuncia.',               url:'Herencia/portal.html'},

  {id:'ssocial',    icon:'🛡️', color:'#3a9e6f', titulo:'Seguridad Social',            desc:'Prestaciones por desempleo, pensiones, afiliación, bajas médicas y cotización.',       url:'SSocial/portal.html'},
  {id:'trabajo', icon:'💼', color:'#8b5cf6', titulo:'Derechos del Trabajador', desc:'Despidos, nóminas, falsos autónomos y delitos contra la Seguridad Social.', url:'Trabajadores/portal.html'},
];

function hexBg(hex){return hex+'18'}
function hexBorder(hex){return hex+'40'}
function hexShadow(hex){return hex+'30'}

function renderGrid(list){
  const grid=document.getElementById('areasGrid');
  const noRes=document.getElementById('noResults');
  const cnt=document.getElementById('searchCount');
  if(!list.length){grid.innerHTML='';noRes.style.display='block';cnt.textContent='';return}
  noRes.style.display='none';
  const q=document.getElementById('portalSearch').value.trim();
  cnt.textContent=q?`${list.length} resultado${list.length!==1?'s':''}` :'';
  grid.innerHTML=list.map((a,i)=>`
    <div class="area-card" onclick="window.location.href='${a.url}'"
      style="--card-color:${a.color};--card-bg:${hexBg(a.color)};--card-border:${hexBorder(a.color)};--card-shadow:${hexShadow(a.color)};animation-delay:${i*.045}s">
      <div class="area-icon">${a.icon}</div>
      <h2>${a.titulo}</h2>
      <p>${a.desc}</p>
      <span class="area-arrow">Ver artículos →</span>
    </div>
  `).join('');
  document.querySelectorAll('.area-card').forEach(bindCursor);
}

function filterAreas(q){
  const query=q.toLowerCase().trim();
  if(!query){renderGrid(AREAS);return}
  renderGrid(AREAS.filter(a=>a.titulo.toLowerCase().includes(query)||a.desc.toLowerCase().includes(query)||a.id.includes(query)));
}

/* ── COUNTER ANIMATION ── */
function animateCount(el,target,suffix){
  let start=0;const dur=1600;const t0=performance.now();
  function step(t){
    const p=Math.min((t-t0)/dur,1);
    const ease=1-Math.pow(1-p,3);
    el.textContent=Math.round(start+(target-start)*ease)+(suffix||'');
    if(p<1)requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}
window.addEventListener('load',()=>{
  setTimeout(()=>animateCount(document.getElementById('sAreas'),AREAS.length,''),500);
});

renderGrid(AREAS);
</script>
