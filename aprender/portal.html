<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyBase · Mis Asignaturas</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚖️</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<meta property="og:site_name" content="OpenLexiura">
<meta property="og:title" content="OpenLexiura · Mis Asignaturas">
   <style>
/* ═══════════════════════════════════════════
   TOKENS
═══════════════════════════════════════════ */
:root {
  --bg:      #0b0c10;
  --surface: #13141a;
  --raised:  #1a1b23;
  --border:  rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text:    #e8e6df;
  --muted:   #6b7384;
  --subtle:  #9aa0b0;
  --white:   #ffffff;
  --gold:    #d4a843;
  --gold2:   #f0c96a;
  --radius:  8px;
  --shadow:  0 4px 24px rgba(0,0,0,0.5);
}

/* ═══════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  line-height: 1.6;
}
input, textarea, select, button { font-family: inherit; }
a { color: inherit; text-decoration: none; }
button { cursor: pointer; border: none; background: none; }
img { display: block; max-width: 100%; }

/* ═══════════════════════════════════════════
   TOPBAR
═══════════════════════════════════════════ */
.topbar {
  position: sticky;
  top: 0;
  z-index: 200;
  height: 56px;
  background: rgba(11,12,16,0.95);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 1.5rem;
  gap: 1rem;
}
.topbar-brand {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  font-family: 'Instrument Serif', serif;
  font-size: 1.2rem;
  color: var(--gold2);
  white-space: nowrap;
  flex-shrink: 0;
}
.topbar-brand .logo-icon {
  width: 28px; height: 28px;
  background: linear-gradient(135deg, rgba(212,168,67,0.3), rgba(212,168,67,0.1));
  border: 1px solid rgba(212,168,67,0.4);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.9rem;
}
.topbar-breadcrumb {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  font-size: 0.8rem;
  color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
  overflow: hidden;
  flex: 1;
}
.topbar-breadcrumb .crumb {
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  cursor: pointer;
  transition: color 0.2s;
  max-width: 200px;
}
.topbar-breadcrumb .crumb:hover { color: var(--text); }
.topbar-breadcrumb .crumb.active { color: var(--text); font-weight: 500; }
.topbar-breadcrumb .sep { opacity: 0.3; flex-shrink: 0; }
.topbar-actions {
  display: flex;
  gap: 0.5rem;
  align-items: center;
  margin-left: auto;
  flex-shrink: 0;
}

/* ═══════════════════════════════════════════
   BUTTONS
═══════════════════════════════════════════ */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  padding: 0.5rem 1rem;
  border-radius: 6px;
  font-size: 0.82rem;
  font-weight: 500;
  transition: all 0.18s;
  white-space: nowrap;
}
.btn-ghost {
  background: transparent;
  color: var(--subtle);
  border: 1px solid var(--border2);
}
.btn-ghost:hover { border-color: rgba(255,255,255,0.25); color: var(--text); background: rgba(255,255,255,0.04); }
.btn-sm { padding: 0.35rem 0.75rem; font-size: 0.75rem; }

/* ═══════════════════════════════════════════
   PAGE WRAPPER
═══════════════════════════════════════════ */
#app { min-height: calc(100vh - 56px); }
.page { display: none; animation: pageFade 0.25s ease; }
.page.active { display: block; }
@keyframes pageFade {
  from { opacity:0; transform: translateY(6px); }
  to   { opacity:1; transform: translateY(0); }
}
.page-inner {
  max-width: 1100px;
  margin: 0 auto;
  padding: 2.5rem 1.5rem 5rem;
}

/* ═══════════════════════════════════════════
   HOME — SUBJECT GRID
═══════════════════════════════════════════ */
.subjects-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
  gap: 1rem;
}
.subject-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.5rem;
  cursor: pointer;
  transition: all 0.22s;
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  gap: 0.9rem;
  min-height: 160px;
}
.subject-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--subject-color, var(--gold));
  opacity: 0;
  transition: opacity 0.22s;
}
.subject-card:hover {
  border-color: rgba(255,255,255,0.14);
  transform: translateY(-2px);
  box-shadow: var(--shadow);
}
.subject-card:hover::before { opacity: 1; }
.subject-icon {
  width: 44px; height: 44px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.3rem;
  flex-shrink: 0;
  background: var(--subject-color-bg, rgba(212,168,67,0.12));
  border: 1px solid var(--subject-color-border, rgba(212,168,67,0.25));
}
.subject-card h2 {
  font-size: 1rem;
  font-weight: 600;
  color: var(--white);
  line-height: 1.3;
}
.subject-card p {
  font-size: 0.8rem;
  color: var(--muted);
  line-height: 1.5;
  flex: 1;
}

/* ═══════════════════════════════════════════
   SEARCH & HEADERS
═══════════════════════════════════════════ */
.page-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 1rem;
  margin-bottom: 2rem;
  flex-wrap: wrap;
}
.page-header-left h1 {
  font-family: 'Instrument Serif', serif;
  font-size: clamp(1.8rem, 4vw, 2.5rem);
  font-weight: 400;
  color: var(--white);
}
.search-wrap { position: relative; max-width: 280px; }
.search-input {
  width: 100%;
  background: var(--raised);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 0.45rem 0.85rem 0.45rem 2.2rem;
  color: var(--text);
  font-size: 0.82rem;
  outline: none;
}
.search-icon {
  position: absolute; left: 0.7rem; top: 50%;
  transform: translateY(-50%); color: var(--muted); font-size: 0.8rem;
}

</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-brand">
    <a href="index.html" style="color: var(--muted); text-decoration: none; font-size: 1.2rem; transition: color 0.2s; margin-right: 0.5rem;" title="Volver a Inicio">←</a>
    <div class="logo-icon">📚</div>
    StudyBase
  </div>
  <div class="topbar-breadcrumb" id="breadcrumb"></div>
  <div class="topbar-actions" id="topbarActions"></div>
</header>

<div id="app">
  <div class="page active" id="page-home">
    <div class="page-inner">
      <div class="page-header">
        <div class="page-header-left">
          <h1>Mis Asignaturas</h1>
          <p>Selecciona una asignatura para acceder a sus recursos.</p>
        </div>
        <div class="page-header-right">
          <div class="search-wrap">
            <span class="search-icon">🔍</span>
            <input class="search-input" id="searchInput" placeholder="Buscar asignatura…" oninput="filterSubjects(this.value)">
          </div>
        </div>
      </div>
      <div class="subjects-grid" id="subjectsGrid"></div>
    </div>
  </div>
</div>

<script>
/* ─────────────────────────────────────────
   DATA LAYER
───────────────────────────────────────── */
const STORE_KEY = 'studybase_v1';
function loadData() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || { subjects: [] }; }
  catch { return { subjects: [] }; }
}
let DB = loadData();

/* ─────────────────────────────────────────
   ROUTER & NAVIGATION
───────────────────────────────────────── */
let currentView = 'home';
let currentSbjId = null;

function navigate(view, sbjId) {
  if (view === 'subject') {
    const s = DB.subjects.find(x => x.id === sbjId);
    if (s && s.name.toLowerCase().includes('penal')) { window.location.href = 'penal_economico/'; return; }
    if (s && s.name.toLowerCase().includes('mercantil')) { window.location.href = 'mercantil/'; return; }
    if (s && s.name.toLowerCase().includes('sociedades')) { window.location.href = 'isociedades/'; return; }
  }
  renderBreadcrumb();
}

function renderBreadcrumb() {
  const el = document.getElementById('breadcrumb');
  el.innerHTML = `<span class="crumb active">Inicio</span>`;
}

/* ─────────────────────────────────────────
   HOME & SUBJECT GRID
───────────────────────────────────────── */
let searchQuery = '';
function filterSubjects(q) {
  searchQuery = q.toLowerCase();
  renderSubjectsGrid();
}

function colorBg(hex) { return hex + '18'; }
function colorBorder(hex) { return hex + '40'; }

function renderSubjectsGrid() {
  const grid = document.getElementById('subjectsGrid');
  const subjects = DB.subjects.filter(s =>
    !searchQuery || s.name.toLowerCase().includes(searchQuery)
  );

  grid.innerHTML = subjects.map(s => {
    const color = s.color || '#c8a84b';
    return `
      <div class="subject-card" onclick="navigate('subject','${s.id}')"
           style="--subject-color:${color};--subject-color-bg:${colorBg(color)};--subject-color-border:${colorBorder(color)}">
        <div class="subject-icon">${s.icon||'📚'}</div>
        <h2>${s.name}</h2>
        ${s.description ? `<p>${s.description}</p>` : '<p style="flex:1"></p>'}
      </div>
    `;
  }).join('');
}

/* ─────────────────────────────────────────
   DEMO DATA & INIT
───────────────────────────────────────── */
function seedDemo() {
  if (DB.subjects.length > 0) return;
  DB.subjects = [
    { id: '1', name: 'Derecho Penal Económico', description: 'Delitos societarios y económicos.', icon: '⚖️', color: '#c8a84b' },
    { id: '2', name: 'Derecho Mercantil', description: 'Contratos y sociedades mercantiles.', icon: '🏛️', color: '#4a7fc1' },
    { id: '3', name: 'Impuesto de Sociedades', description: 'Liquidación y normativa fiscal.', icon: '📊', color: '#8b6fcb' },
    { id: '4', name: 'Seguridad Social', description: 'Prestaciones y cotización.', icon: '🛡️', color: '#3a9e6f' }
  ];
  localStorage.setItem(STORE_KEY, JSON.stringify(DB));
}

seedDemo();
renderSubjectsGrid();
renderBreadcrumb();
</script>
</body>
</html>
